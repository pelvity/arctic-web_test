name: CI Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Lint Frontend
        run: npm run lint --workspace=frontend

      - name: Typecheck Frontend
        run: npm --workspace=frontend run build # Assuming Next.js build runs tsc or add custom typecheck script

      - name: Lint Backend
        run: npm run lint --workspace=backend

      - name: Typecheck Backend
        run: npm --workspace=backend run build

  test-backend:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Backend Unit Tests
        run: npm run test --workspace=backend

      - name: Run Backend e2e Tests
        run: npm run test:e2e --workspace=backend
